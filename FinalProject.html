<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>垃圾分類挑戰</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: #222;
  color: white;
}

/* 遊戲容器 */
#game {
  width: 100vw;
  height: 100vh;
  position: relative;
}

/* ✅ 手機直向 → 強制橫向顯示 */
@media screen and (orientation: portrait) {
  #game {
    position: absolute;
    top: 0;
    left: 0;

    width: 100vh;
    height: 100vw;

    transform: rotate(90deg);
    transform-origin: top left;

    /* 把旋轉後畫面移回可視範圍 */
    left: 100vw;
  }
}

/* 上方UI */
#topUI {
  position: absolute;
  top: 10px;
  left: 10px;
  right: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* 愛心 */
#lives {
  font-size: 5vw;
}

/* 倒數 */
#timerContainer {
  display: flex;
  align-items: center;
  gap: 10px;
}

#timerBar {
  width: 40vw;
  height: 6vh;
  background: #555;
  border-radius: 10px;
  overflow: hidden;
}

#timerFill {
  height: 100%;
  width: 100%;
  background: orange;
}

/* 垃圾 */
#garbage {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 15vw;
  cursor: grab;
}

/* 分類桶 */
.bins {
  position: absolute;
  bottom: 10vh;
  width: 100%;
  display: flex;
  justify-content: space-around;
}

.bin {
  width: 20%;
  padding: 2vw;
  background: #444;
  text-align: center;
  border-radius: 10px;
}

/* 回饋 */
.correct {
  background: green !important;
}

.wrong {
  background: red !important;
}

/* 結束畫面 */
#gameOver {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  display: none;
}
</style>
</head>

<body>

<div id="game">

  <div id="topUI">
    <div id="lives">❤️❤️❤️❤️❤️</div>

    <div id="timerContainer">
      <span>倒數計時</span>
      <div id="timerBar">
        <div id="timerFill"></div>
      </div>
    </div>
  </div>

  <div id="garbage">🥤</div>

  <div class="bins">
    <div class="bin" data-type="general">一般垃圾</div>
    <div class="bin" data-type="recycle">資源回收</div>
    <div class="bin" data-type="food">可回收廚餘</div>
    <div class="bin" data-type="other">其它</div>
  </div>

  <div id="gameOver">
    <h1>遊戲結束</h1>
    <p id="result"></p>
    <button onclick="location.reload()">重新開始</button>
  </div>

</div>

<script>
let lives = 5;
let correctCount = 0;
let questionCount = 0;

let timeLimit = 10;
let currentTime = timeLimit;
let timer;

const garbageList = [
  { emoji: "🥤", type: "recycle" },
  { emoji: "🍌", type: "food" },
  { emoji: "🔋", type: "other" },
  { emoji: "🧻", type: "general" }
];

const garbageEl = document.getElementById("garbage");

function updateLives() {
  document.getElementById("lives").innerText = "❤️".repeat(lives);
}

function spawnGarbage() {
  const item = garbageList[Math.floor(Math.random() * garbageList.length)];
  garbageEl.innerText = item.emoji;
  garbageEl.dataset.type = item.type;

  startTimer();
}

function startTimer() {
  clearInterval(timer);
  currentTime = timeLimit;

  timer = setInterval(() => {
    currentTime -= 0.1;
    if (currentTime <= 0) {
      loseLife();
      spawnGarbage();
    }
    updateTimer();
  }, 100);
}

function updateTimer() {
  const percent = (currentTime / timeLimit) * 100;
  document.getElementById("timerFill").style.width = percent + "%";
}

function loseLife() {
  lives--;
  updateLives();

  if (lives <= 0) {
    endGame();
  }
}

function checkAnswer(type, binEl) {
  clearInterval(timer);
  questionCount++;

  if (type === garbageEl.dataset.type) {
    correctCount++;
    binEl.classList.add("correct");
  } else {
    loseLife();
    binEl.classList.add("wrong");
  }

  if (questionCount % 3 === 0 && timeLimit > 4) {
    timeLimit -= 2;
  }

  setTimeout(() => {
    document.querySelectorAll(".bin").forEach(b => b.classList.remove("correct", "wrong"));
    spawnGarbage();
  }, 300);
}

document.querySelectorAll(".bin").forEach(bin => {
  bin.addEventListener("dragover", e => e.preventDefault());

  bin.addEventListener("drop", () => {
    checkAnswer(bin.dataset.type, bin);
  });
});

/* 拖曳 */
garbageEl.setAttribute("draggable", true);

spawnGarbage();

function endGame() {
  clearInterval(timer);
  document.getElementById("gameOver").style.display = "block";
  document.getElementById("result").innerText =
    "答對題數：" + correctCount;
}
</script>

</body>
</html>
