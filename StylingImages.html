<!DOCTYPE html>
<html>
  <head>
    <title>Styling Images</title>
  
<style>
body {
  display: flex;
  justify-content: space-around;
  align-items: center;
  height: 100vh;
  background: #f5f5f5;
}

.img-box {
  width: 33%;
}

.img1 {
  width: 100%;
  height: 300px;
  border-radius: 18px;
  object-fit: cover;
}

.circle {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  border: 5px solid gray;
  object-fit: cover;
}

.img2 {
  width: 100%;
  height: 300px;
}
</style>

</head>
<body>

<div class="img-box">
  <img src="https://picsum.photos/450/240" class="img1">
</div>

<div>
  <img src="https://picsum.photos/300" class="circle">
</div>

<div class="img-box">
  <img src="https://picsum.photos/450/240" class="img2">
</div>

</body>
</html>
