<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>垃圾分類挑戰-手機拖曳測試</title>
    
    <style>
      
      /* ===== 加入字體 ===== */
      @font-face {
        font-family: 'Huninn';
        src: url('jf-openhuninn-2.1.ttf') format('truetype');
      }
      
      /* ===== 全域重置 ===== */
      *{
        margin:0;
        padding:0;
        box-sizing:border-box;
      }
      
      body{
        font-family:'Huninn', Arial, sans-serif;
        background:#222222;
        overflow:hidden;
        color:#fff;
        user-select:none;
      }
      
      *{
        font-family:'Huninn', Arial, sans-serif;
      }
      
      img{
        user-select:none;
      }
      
      .life,
      .itemCard img,
      .bin img,
      #detailImg{
        -webkit-user-drag:none;
      }
      
      #garbage{
        -webkit-user-drag:element;
      }
      
      #app{
        width:100vw;
        height:100vh;
        position:relative;
        overflow:hidden;
      }
      
      @media screen and (orientation:portrait){
        #app{
          position:absolute;
          top:0;
          left:100vw;
          width:100vh;
          height:100vw;
          transform:rotate(90deg);
          transform-origin:top left;
          overflow:hidden;
        }
      }
      
      .page{
        width:100%;
        height:100%;
        display:none;
        position:absolute;
        inset:0;
      }
      
      /* 首頁 */
      #home{
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        gap:28px;
      }
      
      #title{
        font-size:56px;
        color:#FFF;
      }
      
      .menuBtn{
        width:320px;
        padding:20px;
        font-size:28px;
        border:none;
        border-radius:30px;
        color:#FFF;
        background:#444;
        box-shadow:0 6px 0 #2a2a2a;
        transition:all 0.1s ease;
      }
      
      .menuBtn:active{
        transform:translateY(4px);
        box-shadow:0 2px 0 #2a2a2a;
      }
      
      .menuBtn:hover{
        background:#666;
      }
      
      /* 一覽表 */
      #reference{
        padding:24px;
      }
      
      .topBack{
        padding:12px 24px;
        border:none;
        border-radius:12px;
        font-size:22px;
        margin-bottom:18px;
        background:#444;
        color:#fff;
        box-shadow:0 6px 0 #2a2a2a;
        transition:all 0.1s ease;
      }
      
      .topBack:active{
        transform:translateY(4px);
        box-shadow:0 2px 0 #2a2a2a;
      }
      
      #refWrap{
        width:100%;
        height:78vh;
        display:flex;
        align-items:flex-start;
        gap:0;
      }
      
      #leftTabs{
        width:22%;
        display:flex;
        flex-direction:column;
        gap:10px;
        padding-top:8px;
      }
      
      .tabBtn{
        width:100%;
        padding:18px 10px;
        font-size:22px;
        color:#fff;
        background:#2d2d2d;
        border:none;
        border-radius:20px 0 0 20px;
        transition:all .2s;
      }
      
      .tabBtn.active{
        background:#444444;
        transform:scale(1.08);
        transform-origin:right center;
      }
      
      #rightPanel{
        width:78%;
        height:100%;
        background:#444444;
        border-radius:24px;
        padding:18px;
        overflow-y:auto;
      }
      
      #itemsGrid{
        display:grid;
        grid-template-columns:repeat(4,1fr);
        gap:14px;
      }
      
      .itemCard{
        background:#f2f2f2;
        border-radius:12px;
        padding:8px;
        text-align:center;
        color:#fff;
      }
      
      .itemCard img{
        width:100%;
        height:90px;
        object-fit:cover;
        border-radius:10px;
      }
      
      .itemName{
        margin-top:8px;
        font-size:18px;
        color:#ffffff;
      }
      
      #detailBox{
        position:absolute;
        inset:0;
        background:rgba(0,0,0,.55);
        display:none;
        justify-content:center;
        align-items:center;
        z-index:50;
      }
      
      #detailCard{
        width:72%;
        background:#6a6666;
        border-radius:26px;
        padding:28px;
      }
      
      #detailFlex{
        display:flex;
        gap:26px;
        align-items:flex-start;
      }
      
      #detailImg{
        width:140px;
        height:140px;
        object-fit:cover;
        border-radius:14px;
      }
      
      #detailText{
        flex:1;
      }
      
      #detailName{
        font-size:42px;
        margin-bottom:16px;
      }
      
      #detailDesc{
        font-size:30px;
        line-height:1.5;
      }
      
      #closeDetail{
        margin:22px auto 0;
        display:block;
        width:180px;
        padding:14px;
        border:none;
        border-radius:16px;
        background:#8d8a8a;
        color:#fff;
        font-size:28px;
      }
      
      /* 遊戲頁 */
      #questionNumber{
        position:absolute;
        top:1vh;
        left:50%;
        transform:translateX(-50%);
        font-size:32px;
        font-weight:bold;
      }
      
      #topBar{
        position:absolute;
        top:6vh;
        left:2vw;
        right:2vw;
        display:flex;
        justify-content:space-between;
        align-items:center;
      }
      
      #lives{
        display:flex;
        gap:8px;
      }
      
      .life{
        width:38px;
        height:38px;
      }
      
      #timerWrap{
        display:flex;
        align-items:center;
        gap:10px;
      }
      
      #timerBar{
        width:34vw;
        height:50px;
        background:#444;
        border-radius:20px;
        overflow:hidden;
      }
      
      #timerFill{
        width:100%;
        height:100%;
        background:#ffae00;
      }
      
      #garbageArea{
        position:absolute;
        top:30%;
        left:50%;
        transform:translateX(-50%);
        text-align:center;
      }
      
      #garbage{
        width:160px;
        height:160px;
        object-fit:contain;
      }
      
      #garbageName{
        margin-top:12px;
        font-size:28px;
      }
      
      #bins{
        position:absolute;
        bottom:4vh;
        width:100%;
        display:flex;
        justify-content:space-evenly;
        align-items:flex-end;
      }
      
      .bin{
        width:18%;
        text-align:center;
      }
      
      .bin img{
        width:100%;
        max-height:150px;
        object-fit:contain;
        pointer-events:none;
      }
      
      .otherBox{
        width:100%;
        height:140px;
        background:#444;
        border-radius:12px;
        display:flex;
        justify-content:center;
        align-items:center;
        font-size:32px;
        font-weight:bold;
      }
      
      #feedback{
        position:absolute;
        top:50%;
        left:50%;
        transform:translate(-50%,-50%);
        width:60%;
        background:#444;
        color:#fff;
        border-radius:18px;
        padding:28px;
        text-align:center;
        display:none;
      }
      
      #feedbackTitle{
        font-size:36px;
        font-weight:bold;
      }
      
      #feedbackText{
        margin-top:14px;
        font-size:24px;
        line-height:1.6;
      }
      
      #nextBtn{
        margin-top:18px;
        padding:14px 32px;
        font-size:24px;
        border:none;
        border-radius:12px;
        background:#837f7f;
        color:#fff;
      }
      
      #gameOver{
        position:absolute;
        inset:0;
        background:rgba(0,0,0,.8);
        display:none;
        justify-content:center;
        align-items:center;
      }
      
      #gameOverBox{
        width:420px;
        background:#fff;
        color:#222;
        padding:30px;
        border-radius:20px;
        text-align:center;
      }
      
      .endBtn{
        width:100%;
        margin-top:12px;
        padding:14px;
        font-size:22px;
        border:none;
        border-radius:12px;
      }
    </style>
  </head>
  
  <body>
    
    <div id="app">
      
      <div class="page" id="home">
        <div id="title">垃圾分類挑戰</div>
        <button class="menuBtn" onclick="startGame()">開始</button>
        <button class="menuBtn" onclick="showPage('reference')">分類一覽表</button>
      </div>
      
      <div class="page" id="reference">
        <button class="topBack" onclick="showPage('home')">回首頁</button>
        
        <div id="refWrap">
          
          <div id="leftTabs">
            <button class="tabBtn active" onclick="selectTab('general',this)">一般垃圾</button>
            <button class="tabBtn" onclick="selectTab('recycle',this)">資源回收</button>
            <button class="tabBtn" onclick="selectTab('food',this)">廚餘回收</button>
            <button class="tabBtn" onclick="selectTab('other',this)">其他</button>
          </div>
          
          <div id="rightPanel">
            <div id="itemsGrid"></div>
          </div>
          
        </div>
        
        <div id="detailBox">
          <div id="detailCard">
            <div id="detailFlex">
              <img id="detailImg" src="">
              <div id="detailText">
                <div id="detailName"></div>
                <div id="detailDesc"></div>
              </div>
            </div>
            <button id="closeDetail" onclick="closeDetail()">確定</button>
          </div>
        </div>
      </div>
      
      <div class="page" id="gamePage">
        
        <div id="questionNumber">第1題</div>
        
        <div id="topBar">
          <div id="lives"></div>
          
          <div id="timerWrap">
            <span>倒數計時</span>
            <div id="timerBar">
              <div id="timerFill"></div>
            </div>
          </div>
        </div>
        
        <div id="garbageArea">
          <img id="garbage" draggable="true" src="">
          <div id="garbageName"></div>
        </div>
        
        <div id="bins">
          <div class="bin" data-type="general"><img src="image.png"></div>
          <div class="bin" data-type="recycle"><img src="image (1).png"></div>
          <div class="bin" data-type="food"><img src="image-removebg-preview.png"></div>
          <div class="bin" data-type="other"><div class="otherBox">其他</div></div>
        </div>
        
        <div id="feedback">
          <div id="feedbackTitle"></div>
          <div id="feedbackText"></div>
          <button id="nextBtn">下一題</button>
        </div>
        
        <div id="gameOver">
          <div id="gameOverBox">
            <h1>挑戰結束</h1>
            <h2 id="finalScore"></h2>
            <button class="endBtn" onclick="startGame()">再來一次</button>
            <button class="endBtn" onclick="showPage('home')">回首頁</button>
          </div>
        </div>
        
      </div>
    </div>
    
    <script>
      const heartURL = "heart.webp";
      
      const garbageList = [
        {name:"塑膠保鮮盒",img:"image (5).png",type:"recycle",desc:"簡易清潔後交給回收車。"},
        {name:"衛生紙",img:"image (4).png",type:"general",desc:"妥善裝袋後交給垃圾車。"},
        {name:"壁紙",img:"image (2).png",type:"general",desc:"裝袋後丟一般垃圾。"},
        {name:"紙本發票",img:"image (3).png",type:"general",desc:"一般垃圾處理。"},
        {name:"鋁箔包",img:"image (6).png",type:"recycle",desc:"清空後交回收。"},
        {name:"延長線",img:"image (7).png",type:"recycle",desc:"屬資源回收類。"},
        {name:"遙控器",img:"image (1).png",type:"other",desc:"電池拆下分類回收。"},
        {name:"洋芋片袋",img:"image.png",type:"general",desc:"不可回收，丟一般垃圾。"},
        {name:"果皮菜葉",img:"image-removebg-preview.png",type:"food",desc:"投入廚餘桶。"}
      ];
      
      let lives,score,totalQ,current,timeLimit,endTime,timer;
      let canDrop=false;
      let dragging=false;
      
      function showPage(id){
        document.querySelectorAll(".page").forEach(p=>p.style.display="none");
        document.getElementById(id).style.display="block";
        
        if(id==="reference"){
          renderCategory("general");
        }
      }
      showPage("home");
      
      function renderCategory(type){
        let html="";
        
        garbageList.filter(g=>g.type===type).forEach(g=>{
          html += `
          <div class="itemCard" onclick="openDetail('${g.name}','${g.img}','${typeName(g.type)}','${g.desc}')">
            <img src="${g.img}">
            <div class="itemName">${g.name}</div>
          </div>
          `;
        });
        
        document.getElementById("itemsGrid").innerHTML=html;
      }
      
      function selectTab(type,btn){
        document.querySelectorAll(".tabBtn").forEach(t=>t.classList.remove("active"));
        btn.classList.add("active");
        renderCategory(type);
      }
      
      function openDetail(name,img,type,desc){
        document.getElementById("detailImg").src=img;
        document.getElementById("detailName").innerHTML="為"+type;
        document.getElementById("detailDesc").innerHTML=desc;
        document.getElementById("detailBox").style.display="flex";
      }
      
      function closeDetail(){
        document.getElementById("detailBox").style.display="none";
      }
      
      function startGame(){
        lives=5;
        score=0;
        totalQ=0;
        document.getElementById("gameOver").style.display="none";
        showPage("gamePage");
        renderLives();
        nextQuestion();
      }
      
      function renderLives(){
        let html="";
        for(let i=0;i<lives;i++){
          html += `<img class="life" src="${heartURL}">`;
        }
        document.getElementById("lives").innerHTML=html;
      }
      
      function nextQuestion(){
        document.getElementById("feedback").style.display="none";
        totalQ++;
        document.getElementById("questionNumber").innerText="第 "+totalQ+" 題";
        
        timeLimit=10;
        current=garbageList[Math.floor(Math.random()*garbageList.length)];
        
        document.getElementById("garbage").src=current.img;
        document.getElementById("garbageName").innerText=current.name;
        document.getElementById("timerFill").style.width="100%";
        
        canDrop=true;
        startTimer();
      }
      
      function startTimer(){
        clearInterval(timer);
        endTime=Date.now()+timeLimit*1000;
        
        timer=setInterval(()=>{
          let remain=endTime-Date.now();
          
          if(remain<=0){
            clearInterval(timer);
            document.getElementById("timerFill").style.width="0%";
            wrongAnswer(true);
            return;
          }
          
          let percent=remain/(timeLimit*1000)*100;
          document.getElementById("timerFill").style.width=percent+"%";
        },20);
      }
      
      function wrongAnswer(timeout=false){
        canDrop=false;
        clearInterval(timer);
        
        if(timeout){
          document.getElementById("timerFill").style.width="0%";
        }
        
        lives--;
        renderLives();
        
        if(lives<=0){
          endGame();
          return;
        }
        
        showFeedback(false);
      }
      
      function showFeedback(correct){
        document.getElementById("feedback").style.display="block";
        document.getElementById("feedbackTitle").innerHTML=
        correct?"<span style='color:#4fbe41'>正確！</span>":"<span style='color:red'>錯誤！</span>";
        
        document.getElementById("feedbackText").innerHTML=
        `為${typeName(current.type)}<br>${current.desc}`;
      }
      
      document.getElementById("nextBtn").onclick=nextQuestion;
      
      function endGame(){
        clearInterval(timer);
        document.getElementById("finalScore").innerText="本次答對 "+score+" 題";
        document.getElementById("gameOver").style.display="flex";
      }
      
      function typeName(type){
        if(type==="general") return "一般垃圾";
        if(type==="recycle") return "資源回收";
        if(type==="food") return "廚餘回收";
        return "其他";
      }
      
      const garbage=document.getElementById("garbage");
      
      garbage.addEventListener("dragstart",()=>{
        dragging=true;
      });
      
      garbage.addEventListener("dragend",()=>{
        dragging=false;
      });
      
      document.querySelectorAll(".bin").forEach(bin=>{
        
        bin.addEventListener("dragover",e=>{
          if(canDrop) e.preventDefault();
        });
        
        bin.addEventListener("drop",e=>{
          e.preventDefault();
          if(!canDrop || !dragging) return;
          
          dragging=false;
          canDrop=false;
          clearInterval(timer);
          
          if(bin.dataset.type===current.type){
            score++;
            showFeedback(true);
          }else{
            wrongAnswer(false);
          }
        });
      });
    </script>
    
  </body>
</html>
