<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>垃圾分類挑戰-手機拖曳測試</title>
    
    <style>
      
      /* ===== 加入字體 ===== */
      @font-face {
        font-family: 'Huninn';
        src: url('jf-openhuninn-2.1.ttf') format('truetype');
      }
      
      /* ===== 全域重置 ===== */
      *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-weight:400;
      }
      
      body{
        font-family:'Huninn', Arial, sans-serif;
        background:#222222;
        overflow:hidden;
        color:#fff;
        user-select:none;
      }
      
      *{
        font-family:'Huninn', Arial, sans-serif;
      }
      
      img{
        user-select:none;
      }
      
      /* 非遊戲垃圾圖禁止拖曳 */
      .life,
      .itemCard img,
      .bin img,
      #detailImg{
        -webkit-user-drag:none;
      }
        
      #app{
        width:100vw;
        height:100vh;
        position:relative;
        overflow:hidden;
      }
      
      /* 手機直式變橫向 */
      @media screen and (orientation:portrait){
        #app{
          position:absolute;
          top:0;
          left:100vw;
          width:100vh;
          height:100vw;
          transform:rotate(90deg);
          transform-origin:top left;
          overflow:hidden;
        }
      }
      
      .page{
        width:100%;
        height:100%;
        display:none;
        position:absolute;
        inset:0;
      }
      
      /* 首頁 */
      #home{
        display:flex;
        flex-direction:column;
        justify-content:flex-start; /* 改成從上開始 */
        align-items:center;
        padding-top:18dvh; /* ⭐ 關鍵：整體往下 */
        gap:28px;
      }
      
      /* 上半部 */
      #homeTop{
        flex:1;
        display:flex;
        justify-content:center;
        align-items:flex-end;
        padding-top:60px;
        padding-bottom:40px;
      }
      
      /* 下半部 */
      #homeBottom{
        flex:1;
        display:flex;
        flex-direction:column;
        justify-content:flex-start;
        align-items:center;
        gap:24px;
        padding-top:60px;
      }
      
      #title{
        font-size:56px;
        color:#FFF;
        text-align:center;
      }
      
      .menuBtn{
        width:320px;
        padding:20px;
        font-size:28px;
        border:none;
        border-radius:30px;
        color:#FFF;
        background:#444;
        cursor:pointer;
        text-align:center;
      }
      
      /* 一覽表 */
      #reference{
        padding:20px;
      }
      
      .topBack{
        padding:12px 24px;
        border:none;
        border-radius:12px;
        font-size:22px;
        margin-bottom:18px;
        background:#444;
        color:#fff;
      }
      
      #refTitle{
        text-align:center;
        font-size:42px;
        margin-bottom:16px;
      }
      
      /* 新增分類一覽表版型 */
      #refWrap{
        width:100%;
        height:78%;
        display:flex;
        gap:0;
        align-items:stretch;
      }
      
      #categoryTabs{
        width:18%;
        display:flex;
        flex-direction:column;
        justify-content:center;
        gap:10px;
        z-index:2;
      }
      
      .tabBtn{
        width:100%;
        padding:18px 8px;
        border:none;
        border-radius:20px 0 0 20px;
        background:#2d2d2d;
        color:#fff;
        font-size:26px;
        transition:all .2s;
      }
      .tabBtn.active{
        background:#444;
        transform:scale(1.08);
      }
      .tabBtn:hover{
        background:#444;
      }
      
      #itemsPanel{
        width:82%;
        height:100%;
        background:#444444;
        border-radius:28px;
        padding:18px;
        overflow-y:auto;
      }
      
      #itemsGrid{
        display:grid;
        grid-template-columns:repeat(4,1fr);
        gap:16px;
      }
      
      .itemCard{
        border-radius:10px;
        padding:8px;
        text-align:center;
        color:#fff;
      }
      
      .itemCard img{
        width:100%;
        aspect-ratio:1 / 1;
        object-fit:cover;
        border-radius:8px;
      }
      
      .itemName{
        margin-top:8px;
        font-size:22px;
        color:#fff;
      }
      
      /* 詳細資料彈窗 */
      #detailMask{
        position:absolute;
        inset:0;
        background:rgba(0,0,0,.45);
        display:none;
        justify-content:center;
        align-items:center;
        z-index:10;
      }
      
      #detailBox{
        width:70%;
        background:#666;
        border-radius:26px;
        padding:24px;
      }
      
      #detailFlex{
        display:flex;
        gap:24px;
        align-items:flex-start;
      }
      
      #detailImg{
        width:150px;
        height:150px;
        object-fit:cover;
        border-radius:14px;
      }
      
      #detailText{
        flex:1;
      }
      
      #detailName{
        font-size:40px;
        margin-bottom:18px;
      }
      
      #detailType,
      #detailDesc{
        font-size:28px;
        line-height:1.6;
      }
      
      #detailClose{
        margin:24px auto 0;
        display:block;
        width:160px;
        padding:14px;
        font-size:28px;
        border:none;
        border-radius:16px;
        background:#888;
        color:#fff;
      }
      
      /* 遊戲頁 */
      .gameBackBtn{
        position:absolute;
        top:2vh;
        left:2vw;
        z-index:5; /* ⭐ 很重要，避免被其他東西蓋住 */
      }
      
      #questionNumber{
        position:absolute;
        top:1vh;
        left:50%;
        transform:translateX(-50%);
        font-size:32px;
      }
      
      #topBar{
        position:absolute;
        top:10vh;
        left:2vw;
        right:2vw;
        display:flex;
        justify-content:space-between;
        align-items:center;
      }
      
      #lives{
        display:flex;
        gap:8px;
        min-height:12vh;
      }
      
      .life{
        width:12vh;
        height:12vh;
      }
      
      #timerWrap{
        display:flex;
        align-items:center;
        gap:10px;
      }
      
      #timerBar{
        width:34vw;
        height:50px;
        background:#444;
        border-radius:20px;
        overflow:hidden;
      }
      
      #timerFill{
        width:100%;
        height:100%;
        background:#ffae00;
      }
      
      #garbage{
        width:160px;
        height:160px;
        object-fit:contain;
        -webkit-user-drag:element;
      }
      
      #garbageName{
        margin-top:12px;
        font-size:28px;
      }
      
      #bottomArea{
        position:absolute;
        bottom:4vh;
        width:100%;
        display:flex;
        justify-content:center;   /* ⭐ 改這個 */
        gap:3vw;                 /* ⭐ 控制左右距離 */
      }
      
      /* 左右欄 */
      .sideColumn{
        width:22%;
        display:flex;
        flex-direction:column;
        gap:120px;
        align-items:center;
      }
      
      /* 中間垃圾 */
      #centerGarbage{
        width:30%;
        text-align:center;
      }
      
      /* 垃圾名稱 */
      #garbageName{
        margin-top:10px;
        font-size:28px;
      }
      
      /* 垃圾桶 */
      .bin{
        width:100%;
        display:flex;
        justify-content:center;
        align-items:center;
        transform: translateY(-3vh);
        transition: transform 0.15s ease; /* ⭐ 新增 */
      }
      
      /* ⭐ 放大狀態 */
      .bin.active{
        transform: translateY(-3vh) scale(1.15);
      }
      
      .bin img{
        width:100%;
        max-height:140px;
        object-fit:contain;
      }
      
      .otherBox{
        width:105px;
        height:140px;
        background:#444;
        border-radius:12px;
        display:flex;
        justify-content:center;
        align-items:center;
        font-size:32px;
      }
      
      /* 回饋 */
      #feedback{
        position:absolute;
        top:50%;
        left:50%;
        transform:translate(-50%,-50%);
        width:60%;
        background:#444;
        color:#fff;
        border-radius:18px;
        padding:28px;
        text-align:left; /* ← 改這個 */
        display:none;
      }
      
      #feedbackFlex{
        display:flex;
        gap:20px;
        align-items:center;
      }
      
      #feedbackImg{
        width:140px;
        height:140px;
        object-fit:cover;
        border-radius:12px;
        background:#555;
      }
      
      #feedbackRight{
        flex:1;
      }
      
      #feedbackTitle{
        font-size:36px;
      }
      
      #feedbackText{
        margin-top:14px;
        font-size:24px;
        line-height:1.6;
      }
      
      #nextBtn{
        margin:18px auto 0;
        display:block;
        padding:14px 32px;
        font-size:24px;
        border:none;
        border-radius:12px;
        background:#837f7f;
        color:#fff;
      }
      
      /* 結束 */
      #gameOver{
        position:absolute;
        inset:0;
        background:rgba(0,0,0,.8);
        display:none;
        justify-content:center;
        align-items:center;
      }
      
      #gameOverBox{
        width:420px;
        background:#6d6868;
        color:#fff;
        padding:30px;
        border-radius:20px;
        text-align:center;
      }
      
      .endBtn{
        width:100%;
        margin-top:12px;
        padding:14px;
        font-size:22px;
        border:none;
        border-radius:12px;
        background:#888;
        color:#fff;
      }

      #exitConfirm{
        position:absolute;
        inset:0;
        background:rgba(0,0,0,.8);
        display:none;
        justify-content:center;
        align-items:center;
      }
      
      #exitBox{
        width:420px;
        background:#6d6868;
        color:#fff;
        padding:30px;
        border-radius:20px;
        text-align:center;
      }

      *{
        -webkit-tap-highlight-color: transparent;
      }
      
      button, .itemCard, #garbage{
        outline: none;
        cursor:pointer;
      }

      .menuBtn,
      .topBack,
      #detailClose,
      #nextBtn,
      .endBtn{
        box-shadow:0 6px 0 #2a2a2a;
        transition:all 0.1s ease;
      }
      .menuBtn:active,
      .topBack:active,
      #detailClose:active,
      #nextBtn:active,
      .endBtn:active{
        transform: translateY(4px);
        box-shadow: 0 2px 0 #2a2a2a;
      }
      .menuBtn:hover,
      .topBack:hover,
      #detailClose:hover,
      #nextBtn:hover,
      .endBtn:hover{
        background:#666;
      }

      #feedback{ z-index:10; }
      #exitConfirm{ z-index:20; }
      #gameOver{ z-index:30; }
      
    </style>
  </head>
  
  <body>
    
    <div id="app">
      
      <div class="page" id="home">
      
        <div id="homeTop">
          <div id="title">垃圾分類挑戰</div>
        </div>
      
        <div id="homeBottom">
          <button class="menuBtn startBtn" onclick="startGame()">開始</button>
          <button class="menuBtn listBtn" onclick="showPage('reference')">分類一覽表</button>
        </div>
      
      </div>
      
      <div class="page" id="reference">
        <button class="topBack" onclick="showPage('home')">回首頁</button>
        <div id="refTitle">分類一覽表</div>
        
        <div id="refWrap">
          <div id="categoryTabs">
            <button class="tabBtn active" onclick="changeCategory('general',this)">一般垃圾</button>
            <button class="tabBtn" onclick="changeCategory('recycle',this)">資源回收</button>
            <button class="tabBtn" onclick="changeCategory('food',this)">廚餘回收</button>
            <button class="tabBtn" onclick="changeCategory('other',this)">其他</button>
          </div>
          
          <div id="itemsPanel">
            <div id="itemsGrid"></div>
          </div>
        </div>
        
        <div id="detailMask">
          <div id="detailBox">
            <div id="detailFlex">
              <img id="detailImg" src="">
              <div id="detailText">
                <h2 id="detailName"></h2>
                <p id="detailType"></p>
                <p id="detailDesc"></p>
              </div>
            </div>
            <button id="detailClose" onclick="closeDetail()">確定</button>
          </div>
        </div>
      </div>
      
      <div class="page" id="gamePage">
        <button class="topBack gameBackBtn" onclick="openExit()">回首頁</button>
        <div id="questionNumber">第1題</div>
        
        <div id="topBar">
          <div id="lives"></div>
          
          <div id="timerWrap">
            <span>倒數計時</span>
            <div id="timerBar">
              <div id="timerFill"></div>
            </div>
          </div>
        </div>
        
        <div id="bottomArea">
        
          <!-- 左邊 -->
          <div class="sideColumn">
            <div class="bin" data-type="general">
              <img src="image.png">
            </div>
            <div class="bin" data-type="recycle">
              <img src="image (1).png">
            </div>
          </div>
        
          <!-- 中間垃圾 -->
          <div id="centerGarbage">
            <img id="garbage" draggable="true" src="">
            <div id="garbageName"></div>
          </div>
        
          <!-- 右邊 -->
          <div class="sideColumn">
            <div class="bin" data-type="food">
              <img src="image-removebg-preview.png">
            </div>
            <div class="bin" data-type="other">
              <div class="otherBox">其他</div>
            </div>
          </div>
        
        </div>
        
        <div id="feedback">
          
          <div id="feedbackFlex">
            <img id="feedbackImg">
            
            <div id="feedbackRight">
              <div id="feedbackTitle"></div>
              <div id="feedbackText"></div>
            </div>
          </div>
        
          <button id="nextBtn">確認</button>
        </div>
        
        <div id="gameOver">
          <div id="gameOverBox">
            <h1>挑戰結束</h1>
            <h2 id="finalScore"></h2>
            <button class="endBtn" onclick="startGame()">再來一次</button>
            <button class="endBtn" onclick="showPage('home')">回首頁</button>
          </div>
        </div>
        <div id="exitConfirm">
          <div id="exitBox">
            <h2>確定離開遊戲？</h2>
            <p style="margin:16px 0;">目前進度將不會保留</p>
        
            <button class="endBtn" onclick="exitGame()">離開</button>
            <button class="endBtn" onclick="closeExit()">取消</button>
          </div>
        </div>
        
      </div>
    </div>
    
    <script>
      const heartURL = "heart.webp";
      
      const garbageList = [
        {name:"塑膠保鮮盒",img:"image (5).png",type:"recycle",desc:"請簡易清潔後，交給清潔隊循線回收車。"},
        {name:"衛生紙",img:"image (4).png",type:"general",desc:"妥善裝袋後交給循線垃圾車。"},
        {name:"葉菜、果皮類、剩菜",img:"image (6).png",type:"food",desc:"可回收廚餘：請瀝乾後丟至廚餘回收桶。"},
        {name:"鹼性電池",img:"image (7).png",type:"other",desc:"請妥善分類後，單獨交給清潔隊循線回收車。"},
        {name:"壁紙",img:"image (2).png",type:"general",desc:"裝袋後交垃圾車。"},
        {name:"紙本發票",img:"image (3).png",type:"general",desc:"可當一般垃圾。"}
      ];
      
      let lives,score,totalQ,current,timeLimit,endTime,timer;
      let canDrop=false;
      let dragging=false;
      let pendingGameOver=false;
      
      function showPage(id){
        document.querySelectorAll(".page").forEach(p=>p.style.display="none");
        document.getElementById(id).style.display="block";
        
        if(id==="reference"){
          changeCategory("general",document.querySelector(".tabBtn"));
        }
      }
      showPage("home");
      
      /* ===== 分類一覽表新增功能 ===== */
      function changeCategory(type,btn){
        document.querySelectorAll(".tabBtn").forEach(t=>{
          t.classList.remove("active");
        });
        btn.classList.add("active");
        
        let html="";
        
        garbageList.filter(item=>item.type===type).forEach(item=>{
          html += `
          <div class="itemCard"
          onclick="showDetail('${item.name}','${item.img}','${typeName(item.type)}','${item.desc}')">
            <img src="${item.img}">
            <div class="itemName">${item.name}</div>
          </div>`;
        });
        
        document.getElementById("itemsGrid").innerHTML=html;
      }
      
      function showDetail(name,img,type,desc){
        document.getElementById("detailMask").style.display="flex";
        document.getElementById("detailImg").src=img;
        document.getElementById("detailName").innerText = name;
        document.getElementById("detailType").innerText = type;
        document.getElementById("detailDesc").innerText = desc;
      }
      
      function closeDetail(){
        document.getElementById("detailMask").style.display="none";
      }
      
      function startGame(){
        lives=5;
        score=0;
        totalQ=0;
        document.getElementById("gameOver").style.display="none";
        showPage("gamePage");
        renderLives();
        nextQuestion();
      }

      function openExit(){
        clearInterval(timer); // ⭐ 暫停時間
        document.getElementById("exitConfirm").style.display="flex";
      }
      
      function closeExit(){
        document.getElementById("exitConfirm").style.display="none";
      
        // ⭐ 只在遊戲進行中才繼續
        if(canDrop){
          startTimer();
        }
      }
      
      function exitGame(){
        closeExit();
        showPage("home");
      }
      
      function renderLives(){
        let html="";
        for(let i=0;i<lives;i++){
          html += `<img class="life" src="${heartURL}">`;
        }
        document.getElementById("lives").innerHTML=html;
      }
      
      function nextQuestion(){
        document.getElementById("feedback").style.display="none";
        
        totalQ++;
        document.getElementById("questionNumber").innerText="第 "+totalQ+" 題";
        
        timeLimit=10-Math.floor((totalQ-1)/5)*2;
        if(timeLimit<4) timeLimit=4;
        
        current=garbageList[Math.floor(Math.random()*garbageList.length)];
        
        document.getElementById("garbage").src=current.img;
        document.getElementById("garbageName").innerText=current.name;
        
        document.getElementById("timerFill").style.width="100%";
        
        canDrop=true;
        startTimer();
      }
      
      function startTimer(){
        clearInterval(timer);
        
        endTime=Date.now()+timeLimit*1000;
        
        timer=setInterval(()=>{
          let remain=endTime-Date.now();
          
          if(remain<=0){
            clearInterval(timer);
            document.getElementById("timerFill").style.width="0%";
            wrongAnswer(true);
            return;
          }
          
          let percent=remain/(timeLimit*1000)*100;
          document.getElementById("timerFill").style.width=percent+"%";
        },20);
      }
      
      function wrongAnswer(timeout=false){
        canDrop=false;
        clearInterval(timer);
        
        if(timeout){
          document.getElementById("timerFill").style.width="0%";
        }
        
        lives--;
        renderLives();
        
        if(lives<=0){
          pendingGameOver=true;
        }
        
        showFeedback(false);
      }
      
      function showFeedback(correct){
        document.getElementById("feedback").style.display="block";
        
        document.getElementById("feedbackImg").src = current.img;
        
        document.getElementById("feedbackTitle").innerHTML =
        correct ?
        "<span style='color:#4fbe41'>正確！</span>" :
        "<span style='color:red'>錯誤！</span>";
        
        document.getElementById("feedbackText").innerHTML =
        `為${typeName(current.type)}<br>${current.desc}`;
      }
      
      document.getElementById("nextBtn").onclick=function(){
        document.getElementById("feedback").style.display="none";
        
        if(pendingGameOver){
          pendingGameOver=false;
          endGame();
        }else{
          nextQuestion();
        }
      }
      
      function endGame(){
        clearInterval(timer);
        document.getElementById("finalScore").innerText="本次答對 "+score+" 題";
        document.getElementById("gameOver").style.display="flex";
      }
      
      function typeName(type){
        if(type==="general") return "一般垃圾";
        if(type==="recycle") return "資源回收";
        if(type==="food") return "廚餘回收";
        return "其他";
      }
      
      const garbage=document.getElementById("garbage");
      
      garbage.addEventListener("dragstart",()=>{
        dragging=true;
      });
      
      garbage.addEventListener("dragend",()=>{
        dragging=false;
      });
      
      document.querySelectorAll(".bin").forEach(bin=>{
        
        bin.addEventListener("dragover",e=>{
          if(canDrop){
            e.preventDefault();
      
            // ⭐ 清掉全部
            document.querySelectorAll(".bin").forEach(b=>b.classList.remove("active"));
      
            // ⭐ 當前放大
            bin.classList.add("active");
          }
        });
      
        bin.addEventListener("dragleave",()=>{
          bin.classList.remove("active");
        });
        
        bin.addEventListener("drop",e=>{
          e.preventDefault();
          document.querySelectorAll(".bin").forEach(b=>b.classList.remove("active"));
          if(!canDrop || !dragging) return;
          
          dragging=false;
          canDrop=false;
          clearInterval(timer);
          
          let user=bin.dataset.type;
          
          if(user===current.type){
            score++;
            showFeedback(true);
          }else{
            wrongAnswer(false);
          }
        });
      });
      
      garbage.addEventListener("touchstart",()=>{
        dragging=true;
      });
      
      garbage.addEventListener("touchend",e=>{
        if(!canDrop || !dragging) return;
        
        dragging=false;
        
        let touch=e.changedTouches[0];
        let target=document.elementFromPoint(touch.clientX,touch.clientY);
        let bin=target.closest(".bin");
        
        if(!bin) return;
        
        canDrop=false;
        clearInterval(timer);
        
        let user=bin.dataset.type;
        
        if(user===current.type){
          score++;
          showFeedback(true);
        }else{
          wrongAnswer(false);
        }
      });
    </script>
    
  </body>
</html>
