<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>垃圾分類挑戰</title>

<style>

/* ===== 字體 ===== */
@font-face {
  font-family: 'Huninn';
  src: url('jf-openhuninn-2.1.ttf') format('truetype');
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Huninn', Arial, sans-serif;
}

body{
  background:#222222;
  overflow:hidden;
  color:#fff;
  user-select:none;
}

img{
  user-select:none;
}

/* 非垃圾圖片禁止拖曳 */
.life,
.itemCard img,
.bin img,
#detailImg{
  -webkit-user-drag:none;
}

/* 垃圾圖示 */
#garbage{
  width:160px;
  height:160px;
  object-fit:contain;
  cursor:grab;
  -webkit-user-drag:element;
  position:relative;
  touch-action:none;
}

#garbage.dragging{
  cursor:grabbing;
  z-index:999;
  opacity:.9;
}

/* ===== 其餘原本CSS（完全保留） ===== */

#app{
  width:100vw;
  height:100vh;
  position:relative;
}

.page{
  width:100%;
  height:100%;
  display:none;
  position:absolute;
}

#home{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:28px;
}

#title{
  font-size:56px;
  color:#ffcc33;
  font-weight:bold;
}

.menuBtn{
  width:320px;
  padding:18px;
  font-size:28px;
  border:none;
  border-radius:16px;
}

.startBtn{background:#45d15c;}
.listBtn{background:#3ea6ff;}

#reference{
  padding:30px;
}

.topBack{
  padding:12px 24px;
  font-size:22px;
}

#refTitle{
  text-align:center;
  font-size:42px;
}

#itemsGrid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:18px;
}

.itemCard{
  background:#333;
  border-radius:16px;
  padding:15px;
  text-align:center;
}

.itemCard img{
  width:90px;
  height:90px;
}

.itemName{
  margin-top:8px;
  font-size:20px;
}

/* ===== 遊戲區 ===== */

#gamePage{
  background:#222;
}

#garbageArea{
  position:absolute;
  top:30%;
  left:50%;
  transform:translateX(-50%);
  text-align:center;
}

#garbageName{
  margin-top:12px;
  font-size:28px;
}

#bins{
  position:absolute;
  bottom:4vh;
  width:100%;
  display:flex;
  justify-content:space-evenly;
}

.bin{
  width:18%;
}

.otherBox{
  width:100%;
  height:140px;
  background:#444;
  display:flex;
  justify-content:center;
  align-items:center;
}

</style>
</head>

<body>

<div id="app">

<div class="page" id="home">
  <div id="title">垃圾分類挑戰</div>
  <button class="menuBtn startBtn" onclick="startGame()">開始</button>
  <button class="menuBtn listBtn" onclick="showPage('reference')">分類一覽表</button>
</div>

<div class="page" id="reference">
<button class="topBack" onclick="showPage('home')">回首頁</button>
<div id="refTitle">分類一覽表</div>
</div>

<div class="page" id="gamePage">

<div id="garbageArea">
<img id="garbage" src="">
<div id="garbageName"></div>
</div>

<div id="bins">
<div class="bin" data-type="general"></div>
<div class="bin" data-type="recycle"></div>
<div class="bin" data-type="food"></div>
<div class="bin" data-type="other">
<div class="otherBox">其他</div>
</div>
</div>

</div>
</div>

<script>

/* ===== 原本資料 ===== */
const garbageList = [
{ name:"塑膠保鮮盒", img:"image (5).png", type:"recycle" },
{ name:"衛生紙", img:"image (4).png", type:"general" }
];

let current;
let canDrop = false;

/* ===== 頁面 ===== */
function showPage(id){
document.querySelectorAll(".page")
.forEach(p=>p.style.display="none");
document.getElementById(id).style.display="block";
}
showPage("home");

/* ===== 遊戲 ===== */
function startGame(){
showPage("gamePage");
nextQuestion();
}

function nextQuestion(){
current = garbageList[Math.floor(Math.random()*garbageList.length)];
document.getElementById("garbage").src = current.img;
document.getElementById("garbageName").innerText = current.name;
canDrop = true;
resetGarbagePosition();
}

/* =========================
   電腦 + 手機拖曳
========================= */

const garbage = document.getElementById("garbage");

let draggingGarbage = false;
let offsetX = 0;
let offsetY = 0;

/* 電腦 */
garbage.addEventListener("dragstart",()=> draggingGarbage=true);
garbage.addEventListener("dragend",()=> draggingGarbage=false);

document.querySelectorAll(".bin").forEach(bin=>{
bin.addEventListener("dragover",e=>{
if(canDrop) e.preventDefault();
});
bin.addEventListener("drop",e=>{
e.preventDefault();
if(!canDrop || !draggingGarbage) return;
submitAnswer(bin.dataset.type);
});
});

/* 手機 */
garbage.addEventListener("touchstart",e=>{
if(!canDrop) return;

draggingGarbage = true;
garbage.classList.add("dragging");

const touch = e.touches[0];
const rect = garbage.getBoundingClientRect();

offsetX = touch.clientX - rect.left;
offsetY = touch.clientY - rect.top;

garbage.style.position="fixed";
garbage.style.left=rect.left+"px";
garbage.style.top=rect.top+"px";
});

document.addEventListener("touchmove",e=>{
if(!draggingGarbage) return;
e.preventDefault();

const touch = e.touches[0];
garbage.style.left = (touch.clientX-offsetX)+"px";
garbage.style.top = (touch.clientY-offsetY)+"px";

},{passive:false});

document.addEventListener("touchend",()=>{
if(!draggingGarbage) return;

draggingGarbage=false;
garbage.classList.remove("dragging");

const rect = garbage.getBoundingClientRect();
let cx = rect.left+rect.width/2;
let cy = rect.top+rect.height/2;

document.querySelectorAll(".bin").forEach(bin=>{
const b = bin.getBoundingClientRect();
if(cx>=b.left && cx<=b.right && cy>=b.top && cy<=b.bottom){
submitAnswer(bin.dataset.type);
}
});

resetGarbagePosition();
});

/* 作答 */
function submitAnswer(user){
if(!canDrop) return;

canDrop=false;

if(user===current.type){
alert("正確");
}else{
alert("錯誤");
}
}

/* 回原位 */
function resetGarbagePosition(){
garbage.style.position="relative";
garbage.style.left="0";
garbage.style.top="0";
}

</script>

</body>
</html>
