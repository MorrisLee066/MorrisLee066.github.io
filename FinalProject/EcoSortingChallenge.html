<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>垃圾分類挑戰</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-user-drag:none;
}

body{
  font-family:Arial, sans-serif;
  background:#222222;
  color:#ffffff;
  overflow:hidden;
  user-select:none;
}

img{
  user-select:none;
  -webkit-user-drag:none;
}

#app{
  width:100vw;
  height:100vh;
  position:relative;
  overflow:hidden;
}

@media screen and (orientation:portrait){
  #app{
    position:absolute;
    top:0;
    left:100vw;
    width:100vh;
    height:100vw;
    transform:rotate(90deg);
    transform-origin:top left;
  }
}

.page{
  display:none;
  position:absolute;
  inset:0;
}

/* ======================
   首頁
====================== */
#home{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:28px;
}

#title{
  font-size:56px;
  font-weight:bold;
  color:#ffcc33;
}

.menuBtn{
  width:320px;
  padding:18px;
  font-size:28px;
  border:none;
  border-radius:16px;
  cursor:pointer;
}

.startBtn{background:#45d15c;}
.listBtn{background:#3ea6ff;}

/* ======================
   遊戲頁
====================== */
#questionNumber{
  position:absolute;
  top:1vh;
  left:50%;
  transform:translateX(-50%);
  font-size:32px;
  font-weight:bold;
}

#topBar{
  position:absolute;
  top:6vh;
  left:2vw;
  right:2vw;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

#lives{
  display:flex;
  gap:8px;
}

.life{
  width:38px;
  height:38px;
}

#timerWrap{
  display:flex;
  align-items:center;
  gap:10px;
}

#timerBar{
  width:34vw;
  height:26px;
  background:#444;
  border-radius:20px;
  overflow:hidden;
}

#timerFill{
  width:100%;
  height:100%;
  background:#ffae00;
}

#garbageArea{
  position:absolute;
  top:30%;
  left:50%;
  transform:translateX(-50%);
  text-align:center;
}

#garbage{
  width:160px;
  height:160px;
  object-fit:contain;
  cursor:grab;
}

#garbage:active{
  cursor:grabbing;
}

#garbageName{
  margin-top:12px;
  font-size:28px;
}

#bins{
  position:absolute;
  bottom:4vh;
  width:100%;
  display:flex;
  justify-content:space-evenly;
  align-items:flex-end;
}

.bin{
  width:18%;
  text-align:center;
}

.bin img{
  width:100%;
  max-height:150px;
  object-fit:contain;
  pointer-events:none;
}

.otherBox{
  width:100%;
  height:140px;
  background:#444444;
  border-radius:12px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:32px;
  font-weight:bold;
  color:#fff;
}

/* ======================
   回饋
====================== */
#feedback{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:60%;
  background:#ffffff;
  color:#222222;
  border-radius:18px;
  padding:28px;
  text-align:center;
  display:none;
}

#feedbackTitle{
  font-size:36px;
  font-weight:bold;
}

#feedbackText{
  margin-top:14px;
  font-size:24px;
  line-height:1.6;
}

#nextBtn{
  margin-top:18px;
  padding:14px 32px;
  font-size:24px;
  border:none;
  border-radius:12px;
  background:#ffae00;
  cursor:pointer;
}

/* ======================
   結束
====================== */
#gameOver{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.8);
  display:none;
  justify-content:center;
  align-items:center;
}

#gameOverBox{
  width:420px;
  background:#ffffff;
  color:#222222;
  padding:30px;
  border-radius:20px;
  text-align:center;
}

.endBtn{
  width:100%;
  margin-top:12px;
  padding:14px;
  font-size:22px;
  border:none;
  border-radius:12px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="app">

<!-- 首頁 -->
<div class="page" id="home">
  <div id="title">垃圾分類挑戰</div>

  <button class="menuBtn startBtn"
  onclick="startGame()">開始</button>
</div>

<!-- 遊戲頁 -->
<div class="page" id="gamePage">

<div id="questionNumber">第1題</div>

<div id="topBar">

<div id="lives"></div>

<div id="timerWrap">
<span>倒數計時</span>
<div id="timerBar">
<div id="timerFill"></div>
</div>
</div>

</div>

<div id="garbageArea">
<img id="garbage" src="" draggable="true">
<div id="garbageName"></div>
</div>

<div id="bins">

<div class="bin" data-type="general">
<img src="image.png">
</div>

<div class="bin" data-type="recycle">
<img src="image (1).png">
</div>

<div class="bin" data-type="food">
<img src="image-removebg-preview.png">
</div>

<div class="bin" data-type="other">
<div class="otherBox">其他</div>
</div>

</div>

<div id="feedback">
<div id="feedbackTitle"></div>
<div id="feedbackText"></div>
<button id="nextBtn">下一題</button>
</div>

<div id="gameOver">
<div id="gameOverBox">

<h1>挑戰結束</h1>
<h2 id="finalScore"></h2>

<button class="endBtn"
onclick="startGame()">再來一次</button>

</div>
</div>

</div>
</div>

<script>
const heartURL = "heart.jpg";

const garbageList = [
{
name:"塑膠保鮮盒",
img:"垃圾圖片網址1",
type:"recycle",
desc:"請簡易清潔後交給回收車。"
},
{
name:"衛生紙",
img:"垃圾圖片網址2",
type:"general",
desc:"使用後請丟一般垃圾。"
},
{
name:"香蕉皮",
img:"垃圾圖片網址3",
type:"food",
desc:"可回收廚餘。"
},
{
name:"電池",
img:"垃圾圖片網址4",
type:"other",
desc:"請交由指定回收點。"
}
];

let lives;
let score;
let totalQ;
let current;
let timeLimit;
let endTime;
let timer;
let answered = false;

function showPage(id){
document.querySelectorAll(".page")
.forEach(p=>p.style.display="none");

document.getElementById(id).style.display="block";
}

showPage("home");

/* ===================
   開始
=================== */
function startGame(){

lives = 5;
score = 0;
totalQ = 0;
timeLimit = 10;
answered = false;

document.getElementById("gameOver").style.display="none";

showPage("gamePage");

renderLives();
nextQuestion();
}

/* ===================
   愛心
=================== */
function renderLives(){

let html = "";

for(let i=0;i<lives;i++){
html += `<img class="life" src="${heartURL}">`;
}

document.getElementById("lives").innerHTML = html;
}

/* ===================
   出題
=================== */
function nextQuestion(){

answered = false;

document.getElementById("feedback").style.display="none";

totalQ++;

document.getElementById("questionNumber").innerText =
"第 " + totalQ + " 題";

timeLimit = 10 - Math.floor((totalQ-1)/5)*2;
if(timeLimit < 4) timeLimit = 4;

current =
garbageList[Math.floor(Math.random()*garbageList.length)];

const g = document.getElementById("garbage");
g.src = current.img;
g.dataset.type = current.type;

document.getElementById("garbageName").innerText =
current.name;

/* 倒數條立刻滿 */
const fill = document.getElementById("timerFill");
fill.style.transition = "none";
fill.style.width = "100%";

requestAnimationFrame(()=>{
fill.style.transition = "width .05s linear";
});

startTimer();
}

/* ===================
   計時
=================== */
function startTimer(){

clearInterval(timer);

endTime = Date.now() + timeLimit * 1000;

timer = setInterval(()=>{

let remain = endTime - Date.now();

if(remain <= 0){

clearInterval(timer);

/* 歸零 */
document.getElementById("timerFill").style.width = "0%";

if(!answered){
wrongAnswer();
}

return;
}

let percent =
remain / (timeLimit*1000) * 100;

document.getElementById("timerFill").style.width =
percent + "%";

},30);
}

/* ===================
   答錯
=================== */
function wrongAnswer(){

answered = true;

lives--;
renderLives();

if(lives <= 0){
endGame();
return;
}

showFeedback(false);
}

/* ===================
   僅允許垃圾圖拖曳
=================== */
const garbage =
document.getElementById("garbage");

garbage.addEventListener("dragstart",e=>{

e.dataTransfer.setData("garbage","true");
e.dataTransfer.setData("type",current.type);

});

document.querySelectorAll(".bin").forEach(bin=>{

bin.addEventListener("dragover",e=>{
e.preventDefault();
});

bin.addEventListener("drop",e=>{

e.preventDefault();

if(answered) return;

/* 非垃圾物件拖入無效 */
if(e.dataTransfer.getData("garbage") !== "true"){
return;
}

clearInterval(timer);

/* 歸零 */
document.getElementById("timerFill").style.width = "0%";

answered = true;

let user = bin.dataset.type;

if(user === current.type){
score++;
showFeedback(true);
}else{
wrongAnswer();
}

});

});

/* ===================
   回饋
=================== */
function showFeedback(correct){

document.getElementById("feedback").style.display="block";

if(correct){

document.getElementById("feedbackTitle").innerHTML =
"<span style='color:green'>正確！</span>";

}else{

document.getElementById("feedbackTitle").innerHTML =
"<span style='color:red'>錯誤！</span>";
}

document.getElementById("feedbackText").innerHTML =
`為 ${typeName(current.type)}<br>${current.desc}`;
}

document.getElementById("nextBtn").onclick = ()=>{
nextQuestion();
};

/* ===================
   結束
=================== */
function endGame(){

clearInterval(timer);

document.getElementById("finalScore").innerText =
"本次答對 " + score + " 題";

document.getElementById("gameOver").style.display =
"flex";
}

/* ===================
   中文名稱
=================== */
function typeName(type){

if(type==="general") return "一般垃圾";
if(type==="recycle") return "資源回收";
if(type==="food") return "廚餘回收";
return "其他";
}
</script>

</body>
</html>
