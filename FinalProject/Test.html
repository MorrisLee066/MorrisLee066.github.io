<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>垃圾分類挑戰-手機拖曳測試</title>
    
    <style>
      
      @font-face {
        font-family: 'Huninn';
        src: url('jf-openhuninn-2.1.ttf') format('truetype');
      }
      
      *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-weight:400;
      }
      
      body{
        font-family:'Huninn', Arial, sans-serif;
        background:#222222;
        overflow:hidden;
        color:#fff;
        user-select:none;
      }
      
      *{
        font-family:'Huninn', Arial, sans-serif;
      }
      
      img{
        user-select:none;
      }
      
      .life,
      .itemCard img,
      .bin img,
      #detailImg{
        -webkit-user-drag:none;
      }
        
      #app{
        width:100vw;
        height:100vh;
        position:relative;
        overflow:hidden;
      }
      
      @media screen and (orientation:portrait){
        #app{
          position:absolute;
          top:0;
          left:100vw;
          width:100vh;
          height:100vw;
          transform:rotate(90deg);
          transform-origin:top left;
          overflow:hidden;
        }
      }
      
      .page{
        width:100%;
        height:100%;
        display:none;
        position:absolute;
        inset:0;
      }
      
      #home{
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        gap:28px;
      }
      
      #title{
        font-size:56px;
        color:#FFF;
      }
      
      .menuBtn{
        width:320px;
        padding:20px;
        font-size:28px;
        border:none;
        border-radius:30px;
        color:#FFF;
        background:#444;
        cursor:pointer;
      }
      
      #reference{
        padding:20px;
      }
      
      .topBack{
        padding:12px 24px;
        border:none;
        border-radius:12px;
        font-size:22px;
        margin-bottom:18px;
        background:#444;
        color:#fff;
      }
      
      #refTitle{
        text-align:center;
        font-size:42px;
        margin-bottom:16px;
      }
      
      #refWrap{
        width:100%;
        height:78%;
        display:flex;
        gap:0;
        align-items:stretch;
      }
      
      #categoryTabs{
        width:18%;
        display:flex;
        flex-direction:column;
        justify-content:center;
        gap:10px;
        z-index:2;
      }
      
      .tabBtn{
        width:100%;
        padding:18px 8px;
        border:none;
        border-radius:20px 0 0 20px;
        background:#2d2d2d;
        color:#fff;
        font-size:26px;
        transition:all .2s;
      }
      
      .tabBtn.active{
        background:#444;
        transform:scale(1.08);
      }
      
      #itemsPanel{
        width:82%;
        height:100%;
        background:#444444;
        border-radius:28px;
        padding:18px;
        overflow-y:auto;
      }
      
      #itemsGrid{
        display:grid;
        grid-template-columns:repeat(4,1fr);
        gap:16px;
      }
      
      .itemCard{
        border-radius:10px;
        padding:8px;
        text-align:center;
        color:#fff;
      }
      
      .itemCard img{
        width:100%;
        aspect-ratio:1 / 1;
        object-fit:cover;
        border-radius:8px;
      }
      
      .itemName{
        margin-top:8px;
        font-size:22px;
      }
      
      #detailMask{
        position:absolute;
        inset:0;
        background:rgba(0,0,0,.45);
        display:none;
        justify-content:center;
        align-items:center;
        z-index:10;
      }
      
      #detailBox{
        width:70%;
        background:#666;
        border-radius:26px;
        padding:24px;
      }
      
      #detailFlex{
        display:flex;
        gap:24px;
      }
      
      #detailImg{
        width:150px;
        height:150px;
        object-fit:cover;
        border-radius:14px;
      }
      
      #detailText{
        flex:1;
      }
      
      #detailName{
        font-size:40px;
        margin-bottom:18px;
      }
      
      #detailType,
      #detailDesc{
        font-size:28px;
        line-height:1.6;
      }
      
      #detailClose{
        margin:24px auto 0;
        display:block;
        width:160px;
        padding:14px;
        font-size:28px;
        border:none;
        border-radius:16px;
        background:#888;
        color:#fff;
      }

      /* ===== feedback 新版（左圖右字） ===== */
      #feedback{
        position:absolute;
        top:50%;
        left:50%;
        transform:translate(-50%,-50%);
        width:70%;
        background:#444;
        color:#fff;
        border-radius:18px;
        padding:24px;
        display:none;
      }

      #feedbackFlex{
        display:flex;
        gap:20px;
        align-items:center;
      }

      #feedbackImg{
        width:120px;
        height:120px;
        object-fit:contain;
        border-radius:12px;
        background:#555;
      }

      #feedbackTextWrap{
        flex:1;
      }

      #feedbackTitle{
        font-size:36px;
      }

      #feedbackText{
        margin-top:10px;
        font-size:24px;
        line-height:1.6;
      }
      
      #nextBtn{
        margin-top:18px;
        padding:14px 32px;
        font-size:24px;
        border:none;
        border-radius:12px;
        background:#837f7f;
        color:#fff;
      }
      
    </style>
  </head>
  
  <body>
    
    <div id="app">

      <!-- 其他頁面完全不動 -->

      <div id="feedback">
        <div id="feedbackFlex">
          <img id="feedbackImg">
          <div id="feedbackTextWrap">
            <div id="feedbackTitle"></div>
            <div id="feedbackText"></div>
          </div>
        </div>
        <button id="nextBtn">確認</button>
      </div>

    </div>

    <script>
      
      function showFeedback(correct){
        document.getElementById("feedback").style.display="block";
        
        document.getElementById("feedbackImg").src = current.img;
        
        document.getElementById("feedbackTitle").innerHTML =
        correct ?
        "<span style='color:#4fbe41'>正確！</span>" :
        "<span style='color:red'>錯誤！</span>";
        
        document.getElementById("feedbackText").innerHTML =
        `為${typeName(current.type)}<br>${current.desc}`;
      }

    </script>
    
  </body>
</html>
